name: Python Tests

# Trigger the workflow on every push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Clones your repository code

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Adjust this to your local Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt # Installs pytest and other libs

    - name: Run tests with pytest
      run: |
        pytest # Automatically finds and runs your tests
